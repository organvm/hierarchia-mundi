# gravity.conf
# Configuration for the gravitational interaction daemon.
# The weakest force, but the only one with infinite range
# and no negative charge. It shapes the large-scale structure
# of the entire universe.

[constants]
G = 6.67430e-11    # m³ kg⁻¹ s⁻² — Newton's gravitational constant
c = 299792458      # m/s — speed of light (speed limit for gravity waves)

[newtonian]
# Valid for: v << c, weak fields, non-relativistic masses
# F = G * m1 * m2 / r²
# Simple. Elegant. Wrong at the edges.
inverse_square_law = true
action_at_a_distance = true  # Newton himself called this "absurd"

[general_relativity]
# Einstein (1915): Gravity is not a force.
# Mass-energy tells spacetime how to curve.
# Curved spacetime tells matter how to move.
# The metric tensor g_μν encodes the geometry.
metric_signature = "(-,+,+,+)"  # Lorentzian
field_equation = "G_μν + Λg_μν = (8πG/c⁴)T_μν"
cosmological_constant_Λ = 1.1056e-52  # m⁻² (dark energy)

[gravitational_waves]
# Ripples in spacetime itself. Predicted 1916. Detected 2015.
speed = c              # Exactly the speed of light
polarization = "tensor"  # Two polarizations: + and ×
source = "accelerating mass quadrupole moment"
first_detection = "GW150914"  # Two black holes, 1.3 billion light-years away

[singularities]
# Where GR breaks down and quantum gravity is needed.
# These are bugs in the current physics engine.
black_hole = "r_s = 2GM/c²"   # Schwarzschild radius
big_bang = "t = 0"             # Initial singularity
resolution = "UNKNOWN — requires /sys/quantum_mechanics/ integration"

[dark_matter]
# 27% of the universe's mass-energy content.
# We know it exists (galactic rotation curves, gravitational lensing).
# We do not know what it is.
fraction_of_universe = 0.27
candidate_particles = ["WIMPs", "axions", "sterile neutrinos"]
detected = false  # As of last observation epoch

[dark_energy]
# 68% of the universe's mass-energy content.
# Driving accelerating expansion since ~5 billion years ago.
# We do not know what it is either.
fraction_of_universe = 0.68
equation_of_state_w = -1.0  # Consistent with cosmological constant
nature = "UNKNOWN"

# ============================================================
# NEWTON'S THREE LAWS — The classical approximation
# ============================================================
# Before Einstein, these were the laws of the universe.
# They are still correct for v << c and weak gravitational fields.
# Every bridge, every rocket, every ball thrown — Newton.

[newton]
first_law = "Inertia: a body at rest stays at rest; in motion stays in motion"
# Unless acted upon by an external force.
# The universe's default state is persistence, not change.
# Change requires energy. Entropy is the only free change.

second_law = "F = ma — force equals mass times acceleration"
# The most consequential equation in classical physics.
# From this: orbital mechanics, fluid dynamics, structural engineering.
# The entire built environment (/usr/infrastructure/) is an application of F=ma.

third_law = "Every action has an equal and opposite reaction"
# Conservation of momentum, formalized.
# Rockets work because exhaust pushes the rocket.
# Markets work because buyer and seller exert equal force on price.
# This is meta-law L7_CONSERVATION (/logic_gates.sys) in physical form.

# ============================================================
# RELATIVISTIC REGIME — Where Newton breaks
# ============================================================

[special_relativity]
# Einstein (1905): The speed of light is constant in all reference frames.
# Consequence: time dilates, length contracts, mass increases with velocity.
time_dilation = "Δt' = Δt / √(1 - v²/c²)"
# A clock on a GPS satellite ticks 38μs/day faster than on Earth.
# Without relativistic correction, GPS would drift ~10 km/day.
# General relativity is not exotic — it is in your phone.

mass_energy = "E = mc²"
# Mass IS energy. Energy IS mass. The conversion factor is c².
# The Sun converts 4.3 million tonnes of mass into energy per second.
# Nuclear weapons exploit this. Nuclear power exploits this.
# Your body exploits this (mass defect in nuclear binding).

[gravitational_lensing]
# Mass bends spacetime → light follows curved paths → distant objects are magnified.
# First confirmed: 1919 solar eclipse (Eddington). Einstein vindicated.
# Now used as a cosmic telescope: galaxy clusters magnify objects behind them.
# Dark matter mapped by its lensing signature — invisible mass,
# visible effect. The universe reveals itself through distortion.
