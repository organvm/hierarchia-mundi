name: Release

# Tag a commit to ship a release:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds the sdist + wheel, attaches them to a GitHub Release, and
# (when the `pypi` environment is configured with a Trusted Publisher)
# publishes to PyPI. No long-lived secrets are required — PyPI publishing
# uses OIDC Trusted Publishing.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    name: Attach artifacts to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  pypi-publish:
    name: Publish to PyPI
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    # Configure this environment with a PyPI Trusted Publisher to enable
    # publishing. Until then the job is skipped/blocked, but build +
    # github-release still ship the artifacts.
    environment:
      name: pypi
      url: https://pypi.org/p/hierarchia
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
